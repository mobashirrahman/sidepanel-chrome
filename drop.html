<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drop</title>
  <link rel="stylesheet" href="drop.css">
</head>
<body>
  <div class="drop-container">
    <div class="header">
      <h2>Drop</h2>
      <p>Share files and notes across devices</p>
    </div>
    <div class="drop-history" id="drop-history">
      <!-- Items will be injected here -->
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="var(--subtext-color)">
          <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
        </svg>
        <p>Send files and notes to yourself</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-wrapper">
        <button id="attach-btn" title="Attach file">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
          </svg>
        </button>
        <input type="file" id="file-input" class="hidden">
        <textarea id="text-input" placeholder="Type a message or paste a file..." rows="1"></textarea>
        <button id="send-btn" title="Send">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  <script src="drop.js"></script>
</body>
</html>
