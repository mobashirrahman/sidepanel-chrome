<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edge Copilot Sidebar</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <div class="content-area">
      <!-- Top App Bar for pinned apps -->
      <div id="app-bar" class="hidden">
        <div class="app-bar-left">
          <div id="app-title" class="app-title">App Name</div>
          <div id="app-url" class="app-url">https://example.com</div>
        </div>
        <div class="app-bar-right">
          <button id="bar-split" class="bar-icon-btn" title="Split Screen">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 19H5V5h4v14zm10 0h-8V5h8v14z"/>
            </svg>
          </button>
          <button id="bar-open-main" class="bar-icon-btn" title="Open in main window"> 
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
            </svg>
          </button>
          
          <div class="dropdown-container">
            <button id="bar-menu-trigger" class="bar-icon-btn" title="More options">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
              </svg>
            </button>
            <div id="bar-menu" class="bar-dropdown hidden">
              <div class="bar-menu-item" id="menu-refresh">Refresh</div>
              <div class="bar-menu-item" id="menu-copy">Copy link</div>
              <div class="divider"></div>
              <div class="bar-menu-item" id="menu-desktop">
                <span>Show desktop view</span>
                <input type="checkbox" id="desktop-toggle" style="pointer-events: none;">
              </div>
              <div class="bar-menu-item" id="menu-touch">
                <span>Disable touch mode</span>
                <input type="checkbox" id="touch-toggle" style="pointer-events: none;">
              </div>
            </div>
          </div>

          <button id="bar-minimize" class="bar-icon-btn" title="Minimize">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M19 13H5v-2h14v2z"/>
            </svg>
          </button>
          <button id="bar-close" class="bar-icon-btn" title="Close">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>
      
      <div id="primary-workspace" class="workspace">
        <div class="iframe-container">
          <iframe id="main-frame" src="https://copilot.microsoft.com/" frameborder="0" allow="clipboard-read; clipboard-write; microphone; camera;"></iframe>
          <!-- Optional loading overlay -->
          <div id="loading" class="hidden">
            <div class="spinner"></div>
          </div>
        </div>
      </div>

      <!-- Divider for split view -->
      <div id="split-divider" class="hidden"></div>
      
      <!-- Secondary Workspace (Locked to Home AI Provider) -->
      <div id="secondary-workspace" class="workspace hidden">
        <div class="iframe-container">
          <iframe id="secondary-frame" src="https://copilot.microsoft.com/" frameborder="0" allow="clipboard-read; clipboard-write; microphone; camera;"></iframe>
        </div>
      </div>
    </div>
    
    <div class="nav-strip">
      <div class="nav-top">
        <div class="app-icon active" id="home-ai-icon" data-url="https://copilot.microsoft.com/" title="Copilot">
          <img src="" id="home-ai-img" alt="AI Provider" style="display:none;"/>
          <svg id="home-ai-svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/>
          </svg>
        </div>
        <div class="app-icon" data-url="https://www.bing.com/search?q=weather" title="Weather">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/>
          </svg>
        </div>
        
        <div class="divider"></div>
        
        <!-- Pinned sites will be appended here -->
        <div id="pinned-sites-container"></div>
      </div>
      
      <div class="nav-bottom">
        <div class="action-icon" id="add-btn" title="Add site">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </div>
        <div class="action-icon" id="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zm-7.43 2.52c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="close-btn" id="close-settings">&times;</button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <h3>Appearance / Copilot and Sidebar</h3>
          <div class="radio-group">
            <label>
              <input type="radio" name="appearanceMode" value="always" checked>
              Always on
              <span class="subtext">Sidebar will always show</span>
            </label>
            <label>
              <input type="radio" name="appearanceMode" value="autohidden">
              Autohidden
              <span class="subtext">Sidebar will show when using the sidepane</span>
            </label>
          </div>
        </div>
        
        <div class="settings-section">
          <h3>Preferred AI Provider</h3>
          <select id="ai-provider" class="dropdown">
            <option value="https://copilot.microsoft.com/">Copilot</option>
            <option value="https://chatgpt.com/">ChatGPT</option>
            <option value="https://claude.ai/">Claude</option>
            <option value="https://gemini.google.com/">Gemini</option>
            <option value="https://www.perplexity.ai/">Perplexity</option>
            <option value="https://z.ai/">Z.ai</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Pin Modal -->
  <div id="add-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Pin a Website</h2>
        <button class="close-btn" id="close-add">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="pin-url">Website Link</label>
          <input type="url" id="pin-url" placeholder="https://example.com" class="text-input">
        </div>
        <button id="add-custom-link-btn" class="primary-btn">Pin Website</button>

        <div class="divider text-divider"><span>OR</span></div>

        <button id="add-current-tab-btn" class="secondary-btn">Pin Current Active Tab</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
