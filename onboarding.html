<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to AI Sidekick</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 600px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .steps {
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: left;
      background: #f8f9fa;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #eee;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .step-number {
      background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      flex-shrink: 0;
    }
    .step-text {
      font-size: 16px;
    }
    .icon {
      display: inline-block;
      vertical-align: middle;
      width: 20px;
      height: 20px;
    }
    .cta-button {
      margin-top: 30px;
      padding: 12px 24px;
      background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .cta-button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon128.png" alt="AI Sidekick Logo" width="80" style="margin-bottom: 20px;">
    <h1>Welcome to AI Sidekick!</h1>
    <p>To get the best experience and have your AI instantly accessible, please pin the extension to your browser toolbar.</p>
    
    <div class="steps">
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-text">Click the <strong>Puzzle Icon</strong> (Extensions) in the top right corner of Chrome.</div>
      </div>
      <div class="step">
        <div class="step-number">2</div>
        <div class="step-text">Find <strong>AI Sidekick</strong> in the list.</div>
      </div>
      <div class="step">
        <div class="step-number">3</div>
        <div class="step-text">Click the <strong>Pin Icon</strong> next to it so it turns blue.</div>
      </div>
    </div>
    
    <button class="cta-button" onclick="window.close()">Got it! Close this tab</button>
  </div>
</body>
</html>
